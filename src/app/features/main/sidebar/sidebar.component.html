<aside class="sidebar">
  <header class="sidebar__brand">
    <span class="sidebar__brand-badge">
      <img
        ngSrc="/assets/logo-tugma-ai.svg"
        width="32"
        height="32"
        priority
        alt="PESO TUGMAI logo"
      />
    </span>
    <span class="sidebar__brand-text">
      <span class="sidebar__brand-name">PESO TUGMAI</span>
    </span>
  </header>

  <mat-nav-list class="sidebar__nav">
    @for (item of navItems(); track item.link) {
      <a
        mat-list-item
        [routerLink]="item.link"
        routerLinkActive
        #rla="routerLinkActive"
        [activated]="rla.isActive"
      >
        <mat-icon matListItemIcon aria-hidden="true">{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    }
  </mat-nav-list>

  <footer class="sidebar__profile">
    <button
      type="button"
      class="sidebar__profile-trigger"
      [matMenuTriggerFor]="userMenu"
      aria-label="Open account menu"
    >
      <span class="sidebar__avatar" aria-hidden="true">{{ initials() }}</span>
      <span class="sidebar__profile-text">
        <span class="sidebar__profile-name">{{ user()?.fullname }}</span>
        <span class="sidebar__profile-role">{{ roleLabel() }}</span>
      </span>
      <mat-icon class="sidebar__profile-chevron" aria-hidden="true">chevron_right</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu" xPosition="before">
      <a mat-menu-item [routerLink]="routes.profile">
        <mat-icon aria-hidden="true">person</mat-icon>
        <span>Profile</span>
      </a>
      <button mat-menu-item type="button" (click)="logout()">
        <mat-icon aria-hidden="true">logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </footer>
</aside>
