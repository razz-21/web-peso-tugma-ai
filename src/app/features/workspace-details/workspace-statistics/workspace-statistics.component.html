<section class="workspace-statistics">
  <header class="workspace-statistics__intro">
    <h2 class="workspace-statistics__title">Statistics</h2>
    <p class="workspace-statistics__lead">A snapshot of the records scoped to this workspace.</p>
  </header>

  @if (loading()) {
    <div class="workspace-statistics__status" role="status">
      <mat-progress-spinner mode="indeterminate" diameter="40" aria-hidden="true" />
      <p class="workspace-statistics__status-text">Loading statistics...</p>
    </div>
  } @else if (error()) {
    <div class="workspace-statistics__status">
      <mat-icon class="workspace-statistics__status-icon" aria-hidden="true"
        >error_outline</mat-icon
      >
      <p class="workspace-statistics__status-text">Unable to load statistics.</p>
    </div>
  } @else {
    <dl class="workspace-statistics__grid">
      @for (card of cards(); track card.label) {
        <div class="workspace-statistics__card">
          <span class="workspace-statistics__icon" aria-hidden="true">
            <mat-icon>{{ card.icon }}</mat-icon>
          </span>
          <div class="workspace-statistics__body">
            <dt class="workspace-statistics__label">{{ card.label }}</dt>
            <dd class="workspace-statistics__value">{{ card.value }}</dd>
          </div>
        </div>
      }
    </dl>
  }
</section>
