<header class="company-jobs__head">
  <div class="company-jobs__heading">
    <h2 class="company-jobs__title">Job list</h2>
    <span class="company-jobs__count">{{ filteredJobs().length }}</span>
  </div>

  <mat-form-field appearance="outline" class="company-jobs__search" subscriptSizing="dynamic">
    <mat-icon matPrefix>search</mat-icon>
    <input
      matInput
      type="search"
      placeholder="Search jobs"
      aria-label="Search jobs"
      [value]="search()"
      (input)="onSearch($event)"
    />
  </mat-form-field>

  <button mat-flat-button type="button" class="company-jobs__create">
    <mat-icon>add</mat-icon>
    Create job
  </button>
</header>

<div class="app-table">
  <table mat-table [dataSource]="filteredJobs()" class="app-table__table">
    <!-- Title -->
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef scope="col">Title</th>
      <td mat-cell *matCellDef="let job">
        <span class="company-jobs__role">{{ job.title }}</span>
      </td>
    </ng-container>

    <!-- Description -->
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef scope="col">Description</th>
      <td mat-cell *matCellDef="let job">{{ job.description }}</td>
    </ng-container>

    <!-- Location -->
    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef scope="col">Location</th>
      <td mat-cell *matCellDef="let job">{{ job.location }}</td>
    </ng-container>

    <!-- Vacancies -->
    <ng-container matColumnDef="vacancies">
      <th mat-header-cell *matHeaderCellDef scope="col">Vacancies</th>
      <td mat-cell *matCellDef="let job">
        <span class="company-jobs__apps">{{ job.vacancies }}</span>
      </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef scope="col">Status</th>
      <td mat-cell *matCellDef="let job">
        <span class="company-jobs__job-status" [class]="'company-jobs__job-status--' + job.status">
          <span class="company-jobs__job-dot" aria-hidden="true"></span>
          {{ job.statusLabel }}
        </span>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      class="app-table__row--clickable"
      tabindex="0"
      [attr.aria-label]="'View ' + row.title"
      (click)="viewJob.emit(row)"
      (keydown.enter)="viewJob.emit(row)"
    ></tr>
  </table>

  @if (filteredJobs().length === 0) {
    <div class="app-table__status">
      <mat-icon class="app-table__status-icon" aria-hidden="true">work_off</mat-icon>
      <p class="app-table__status-text">No jobs found</p>
    </div>
  }
</div>
