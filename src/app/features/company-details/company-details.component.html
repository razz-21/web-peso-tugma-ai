<mat-drawer-container class="company-details" autosize [hasBackdrop]="false">
  <mat-drawer #jobDrawer class="company-details__drawer" position="end" mode="over">
    <div class="company-details__drawer-head">
      <h2 class="company-details__drawer-title">Job details</h2>
      <button
        mat-icon-button
        type="button"
        aria-label="Close job details"
        (click)="jobDrawer.close()"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>
    <div class="company-details__drawer-body">
      @if (selectedJob(); as job) {
        <app-company-job-details [job]="job" />
      }
    </div>
  </mat-drawer>

  <mat-drawer-content class="company-details__content">
    <a class="company-details__back" [routerLink]="routes.companies">
      <mat-icon>arrow_back</mat-icon>
      <span>Back to companies</span>
    </a>

    @if (store.loading() && !store.company()) {
      <div class="company-details__status" role="status">
        <mat-progress-spinner mode="indeterminate" diameter="40" aria-hidden="true" />
        <p>Loading company...</p>
      </div>
    } @else if (store.company(); as company) {
      <div class="company-details__layout">
        <app-company-profile
          [company]="company"
          (edit)="onEdit($event)"
          (delete)="onDelete($event)"
        />
        <app-company-jobs [company]="company" (viewJob)="onViewJob($event); jobDrawer.open()" />
      </div>
    }
  </mat-drawer-content>
</mat-drawer-container>
