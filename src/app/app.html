<mat-toolbar color="primary" class="app-toolbar">
  <img
    ngSrc="/assets/logo-tugma-ai.svg"
    width="32"
    height="32"
    priority
    alt="Tugma AI logo"
    class="app-toolbar__logo" />
  <span class="app-toolbar__title">{{ title() }}</span>
  <span class="app-toolbar__spacer"></span>
  <mat-slide-toggle [checked]="isDark()" (change)="toggleTheme()">
    {{ themeLabel() }}
  </mat-slide-toggle>
</mat-toolbar>

<main class="app-main">
  <mat-card appearance="filled" class="app-card">
    <mat-card-header>
      <mat-card-title>Material is wired up</mat-card-title>
      <mat-card-subtitle>Colors come from src/styles/theme/*.css</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content class="app-card__content">
      <p>
        Toggle the switch above to swap the <code>.light</code> /
        <code>.dark</code> class on <code>&lt;body&gt;</code>. Every Material
        component re-reads its tokens from your design system.
      </p>

      <mat-form-field appearance="outline">
        <mat-label>Try an input</mat-label>
        <input matInput placeholder="Type something" />
      </mat-form-field>

      <div class="app-card__actions">
        <button mat-flat-button>Filled</button>
        <button mat-stroked-button>Outlined</button>
        <button mat-button>Text</button>
        <button mat-icon-button aria-label="Favorite">
          <mat-icon>favorite</mat-icon>
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <router-outlet />
</main>
