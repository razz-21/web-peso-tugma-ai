<h2 mat-dialog-title class="confirm-dialog__title">{{ data.title }}</h2>
<mat-dialog-content>
  <p class="confirm-dialog__message" [innerHTML]="data.message"></p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton="tonal" type="button" (click)="cancel()">
    {{ data.cancelLabel ?? 'Cancel' }}
  </button>
  <button
    mat-flat-button
    type="button"
    class="confirm-dialog__confirm"
    [class.confirm-dialog__confirm--danger]="data.destructive"
    (click)="confirm()"
    cdkFocusInitial
  >
    {{ data.confirmLabel ?? 'Confirm' }}
  </button>
</mat-dialog-actions>
